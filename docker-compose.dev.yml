# docker-compose.dev.yml — Chat Memory System
#
# ALL-LOCAL mode: Postgres + Redis + API in Docker. No cloud dependencies.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory_postgres
    environment:
      POSTGRES_DB: memory_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/migrations/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - memory_net

  # ---------------------------------------------------------------------------
  # Redis — session memory, caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: memory_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - memory_net

  # ---------------------------------------------------------------------------
  # API — FastAPI application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory_api
    ports:
      - "${API_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/memory_system"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - memory_net

volumes:
  pgdata:

networks:
  memory_net:
    driver: bridge
